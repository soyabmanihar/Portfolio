<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Todo Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <div class="todo-header">
        <a href="../index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Portfolio
        </a>
        <h1>Smart Todo Manager</h1>
    </div>

    <div class="todo-container">
        <!-- Input Section -->
        <div class="input-section">
            <div class="input-group">
                <input type="text" id="taskInput" class="task-input" placeholder="Add a new task...">
                
                <select id="prioritySelect" class="priority-select">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>

                <input type="date" id="dueDateInput" class="due-date-input">

                <button id="addBtn" class="add-btn">
                    <i class="fas fa-plus"></i> Add
                </button>
            </div>

            <!-- Search and Filter -->
            <div class="filter-section">
                <input type="text" id="searchInput" class="search-input" placeholder="Search tasks...">
                
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-list"></i> All
                    </button>
                    <button class="filter-btn" data-filter="active">
                        <i class="fas fa-circle"></i> Active
                    </button>
                    <button class="filter-btn" data-filter="completed">
                        <i class="fas fa-check-circle"></i> Completed
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-box">
            <div class="stat">
                <span class="stat-label">Total:</span>
                <span class="stat-value" id="totalCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Completed:</span>
                <span class="stat-value" id="completedCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Pending:</span>
                <span class="stat-value" id="pendingCount">0</span>
            </div>
        </div>

        <!-- Tasks List -->
        <div class="tasks-container">
            <ul id="taskList" class="task-list"></ul>
            <div id="emptyState" class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <!-- Clear Completed -->
        <button id="clearCompletedBtn" class="clear-completed-btn">
            <i class="fas fa-trash"></i> Clear Completed
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
